# RTKLIB-demo5 (rnx2rtkp, EX 2.5.1) config for the GLONASS SPP oracle
# esbc_gps_glonass_spp_l1_demo5.pos. Single-point (SPP), GPS+GLONASS, L1 only,
# broadcast ephemeris + broadcast Klobuchar ionosphere, troposphere OFF so the
# comparison isolates the GLONASS measurement model (geometry + clock +
# per-system bias + GLONASS-scaled Klobuchar ionosphere) from the
# Niell-vs-simple-Saastamoinen mapping difference between the two
# implementations. Fixture provenance is documented in the consuming test
# crates/sidereon-core/tests/spp_glonass_rtklib_oracle.rs.
pos1-posmode       =single
pos1-frequency     =l1
pos1-soltype       =forward
pos1-elmask        =10
pos1-snrmask_r     =off
pos1-snrmask_b     =off
pos1-dynamics      =off
pos1-tidecorr      =off
pos1-ionoopt       =brdc
pos1-tropopt       =off
pos1-sateph        =brdc
pos1-navsys        =5
pos2-armode        =off
pos2-gloarmode     =off
out-solformat      =xyz
out-outhead        =on
out-outopt         =on
out-timesys        =gpst
out-timeform       =tow
out-height         =ellipsoidal
ant1-postype       =single
